<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prajituri de casa</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      background: #f4f6f9;
      color: #333;
    }

    /* HEADER */
    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: #111;
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    header h1 {
      font-size: 22px;
      letter-spacing: 1px;
    }

    .social {
      position: absolute;
      right: 30px;
      top: 50%;
      transform: translateY(-50%);
    }

    .social a {
      color: white;
      margin-left: 12px;
      text-decoration: none;
      font-size: 14px;
      opacity: 0.8;
    }

    .social a:hover {
      opacity: 1;
    }

    /* LAYOUT */
    .container {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 20px;
      padding: 20px;
    }

    /* PRODUSE */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
    }

    .price {
      font-weight: bold;
      margin-bottom: 10px;
      color: #111;
    }

    .card button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #111;
      color: white;
      cursor: pointer;
    }

    /* CART */
    .cart {
      position: sticky;
      top: 80px;
      height: fit-content;
      background: white;
      border-radius: 15px;
      padding: 15px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    .item {
      border-bottom: 1px solid #eee;
      padding: 10px 0;
    }

    .qty {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 5px 0;
    }

    .qty button {
      padding: 4px 10px;
      border: none;
      background: #ddd;
      border-radius: 5px;
      cursor: pointer;
    }

    .total {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
    }

    .whatsapp-btn {
      margin-top: 15px;
      background: #25D366;
      color: white;
      padding: 12px;
      text-align: center;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    /* RESPONSIVE */
    @media(max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
      }

      .cart {
        position: relative;
        top: auto;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>Prajituri de casa</h1>
  <div class="social">
    <a href="https://www.facebook.com/Valentin0894" target="_blank">Facebook</a>
    <a href="http://instagram.com/valentinboboc94/" target="_blank">Instagram</a>
    <a href="https://www.tiktok.com/@valentinbboboc" target="_blank">TikTok</a>
  </div>
</header>

<div class="container">

  <!-- PRODUSE -->
  <div>
    <div class="grid" id="products"></div>
  </div>

  <!-- COS -->
  <div class="cart">
    <h2>Coș comenzi</h2>
    <div id="cart"></div>

    <input type="text" id="address" placeholder="Adresa de livrare">
    <input type="date" id="deliveryDate">
    <input type="text" id="deliveryTime" placeholder="Ora livrare (ex: 14:00)">

    <div class="total">Total: <span id="total">0</span> RON</div>

    <div class="whatsapp-btn" onclick="confirmOrder()">
      Confirmă comandă
    </div>
  </div>

</div>

<script>
const products = [
  {name:"Tort ciocolata", price:120, img:"https://i.pinimg.com/736x/3e/94/67/3e9467c0d78cba9242a1ca359f2aa8db.jpg"},
  {name:"Cheesecake", price:100, img:"https://media.istockphoto.com/id/2152360017/ro/fotografie/cheesecake-c%C4%83p%C8%99uni.jpg"},
  {name:"Amandina", price:90, img:"https://i.pinimg.com/736x/ab/85/e5/ab85e5aa4e5c4a3df58adc5ffe61a2e3.jpg"},
  {name:"Ecler", price:70, img:"https://i.pinimg.com/736x/61/84/2b/61842b9b77c0b03ee364aa95482b369d.jpg"},
  {name:"Tiramisu", price:110, img:"https://i.pinimg.com/webp/736x/0e/c2/89/0ec289492947872976c5c52215280faa.webp"}
];

let cart = [];

const productsDiv = document.getElementById("products");

products.forEach((p, index) => {
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `
    <img src="${p.img}" />
    <div class="card-content">
      <h3>${p.name}</h3>
      <div class="price">${p.price} RON</div>
      <button onclick="addToCart(${index})">Adaugă în coș</button>
    </div>
  `;
  productsDiv.appendChild(div);
});

function addToCart(index) {
  const item = products[index];
  const found = cart.find(c => c.name === item.name);

  if (found) found.qty++;
  else cart.push({...item, qty:1});

  renderCart();
}

function renderCart() {
  const cartDiv = document.getElementById("cart");
  cartDiv.innerHTML = "";
  let total = 0;

  cart.forEach((item, i) => {
    total += item.price * item.qty;

    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <b>${item.name}</b>
      <div class="qty">
        <button onclick="changeQty(${i},-1)">-</button>
        ${item.qty}
        <button onclick="changeQty(${i},1)">+</button>
      </div>
      <div>${item.price * item.qty} RON</div>
    `;
    cartDiv.appendChild(div);
  });

  document.getElementById("total").innerText = total;
}

function changeQty(i, val) {
  cart[i].qty += val;
  if(cart[i].qty <= 0) cart.splice(i,1);
  renderCart();
}

function confirmOrder() {
  const address = document.getElementById("address").value.trim();
  const date = document.getElementById("deliveryDate").value;
  const time = document.getElementById("deliveryTime").value.trim();

  if (cart.length === 0) {
    alert("Coșul este gol!");
    return;
  }

  if (!address || !date || !time) {
    alert("Completează adresa, data și ora livrării!");
    return;
  }

  let summary = "SUMAR COMANDĂ:\n\n";

  cart.forEach(item => {
    summary += `${item.name} x${item.qty} - ${item.price * item.qty} RON\n`;
  });

  summary += `\nTotal: ${document.getElementById("total").innerText} RON`;
  summary += `\n\nAdresa: ${address}`;
  summary += `\nData: ${date}`;
  summary += `\nOra: ${time}`;

  const confirmSend = confirm(summary + "\n\nTrimiți comanda pe WhatsApp?");

  if (confirmSend) {
    sendWhatsApp(address, date, time);
  }
}

function sendWhatsApp(address, date, time) {
  let message = "Comanda:%0A";

  cart.forEach(item => {
    message += `${item.name} x${item.qty} - ${item.price * item.qty} RON%0A`;
  });

  message += "%0AAdresa: " + address;
  message += "%0AData: " + date;
  message += "%0AOra: " + time;
  message += "%0ATotal: " + document.getElementById("total").innerText;

  window.open("https://wa.me/40769926725?text=" + message, "_blank");
}
</script>

</body>
</html>
