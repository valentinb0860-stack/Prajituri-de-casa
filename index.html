<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Prajituri de casa</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{background:#f4f6f9}

/* HEADER */
header{
  background:#111;color:#fff;
  padding:15px;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}
header h1{text-align:center;}
.social{position:absolute;right:20px;}
.social a{color:#fff;margin-left:10px;text-decoration:none}

/* HERO */
.hero{text-align:center;padding:30px;}
.hero h2{font-size:28px;margin-bottom:10px;}
.hero p{color:#555}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:1fr 320px;
  gap:20px;
  padding:20px;
}

/* PRODUSE */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}
.card{
  background:#fff;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 6px 18px rgba(0,0,0,0.1);
  position:relative;
}
.card img{width:100%;height:180px;object-fit:cover;}
.card-content{padding:15px;}
.card button{
  width:100%;
  padding:10px;
  border:none;
  background:#111;color:#fff;
  border-radius:8px;
  cursor:pointer;
}
.badge{
  position:absolute;
  top:10px;left:10px;
  background:red;color:#fff;
  padding:5px 10px;
  border-radius:6px;
  font-size:12px;
}

/* CART */
.cart{
  background:#fff;
  padding:15px;
  border-radius:15px;
}
.item{
  border-bottom:1px solid #eee;
  padding:10px 0;
  position:relative;
}
.remove-btn{
  position:absolute;
  right:0;
  top:10px;
  background:red;
  color:#fff;
  border:none;
  border-radius:5px;
  padding:2px 6px;
  cursor:pointer;
}
.qty{
  display:flex;
  gap:8px;
  margin:5px 0;
}
.qty button{
  padding:4px 10px;
  border:none;
  background:#ddd;
  border-radius:5px;
  cursor:pointer;
}
.total{margin-top:15px;font-weight:bold;}

.whatsapp-btn{
  margin-top:10px;
  background:#25D366;
  color:#fff;
  padding:10px;
  text-align:center;
  border-radius:8px;
  cursor:pointer;
}

/* CANCEL BTN */
.cancel-btn{
  margin-top:10px;
  background:#e74c3c;
  color:#fff;
  padding:10px;
  text-align:center;
  border-radius:8px;
  cursor:pointer;
}

/* SLIDER */
.slider{
  margin-top:40px;
  overflow:hidden;
  border-radius:15px;
}
.slides{
  display:flex;
  transition:0.5s;
}
.slides img{
  width:100%;
  flex-shrink:0;
}

/* REVIEWS */
.reviews{margin-top:40px;padding:20px;}
.review{
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
}

/* POPUP */
#popup{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}
.popup-box{
  background:#fff;
  padding:20px;
  border-radius:10px;
}
.popup-box input{
  width:100%;
  margin:10px 0;
  padding:8px;
}

/* RESPONSIVE */
@media(max-width:900px){
  .container{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
<h1>Prajituri de casa</h1>
<div class="social">
<a href="#">Facebook</a>
<a href="#">Instagram</a>
</div>
</header>

<div class="hero">
<h2>🍰 Deserturi delicioase, livrate rapid</h2>
<p>Comandă ușor și bucură-te de gust autentic</p>
</div>

<div class="container">

<div>
<div class="grid" id="products"></div>

<!-- SLIDER -->
<div class="slider">
<div class="slides" id="slides">
<img src="https://i.pinimg.com/736x/3e/94/67/3e9467c0d78cba9242a1ca359f2aa8db.jpg">
<img src="https://media.istockphoto.com/id/2152360017/ro/fotografie/cheesecake-c%C4%83p%C8%99uni.jpg">
<img src="https://i.pinimg.com/736x/ab/85/e5/ab85e5aa4e5c4a3df58adc5ffe61a2e3.jpg">
</div>
</div>

<!-- REVIEWS -->
<div class="reviews">
<h2>⭐ Recenzii</h2>
<div class="review">„Foarte bune prăjituri!” – Maria</div>
<div class="review">„Livrare rapidă” – Andrei</div>
<div class="review">„Recomand!” – Elena</div>
</div>

</div>

<div class="cart">
<h2>Coș</h2>
<div id="cart"></div>

<div class="total">Total: <span id="total">0</span> RON</div>

<div class="whatsapp-btn" onclick="openPopup()">Comandă</div>
<div class="cancel-btn" onclick="clearCart()">Anulează comanda</div>
</div>

</div>

<!-- POPUP -->
<div id="popup">
<div class="popup-box">
<h3>Livrare</h3>
<input id="address" placeholder="Adresa">
<input id="time" type="time">
<button onclick="confirmOrder()">Trimite</button>
</div>
</div>

<script>
const products=[
{name:"Tort ciocolata",price:120,img:"https://i.pinimg.com/736x/3e/94/67/3e9467c0d78cba9242a1ca359f2aa8db.jpg",badge:"Cel mai vândut"},
{name:"Cheesecake",price:100,img:"https://media.istockphoto.com/id/2152360017/ro/fotografie/cheesecake-c%C4%83p%C8%99uni.jpg",badge:"Ofertă azi"},
{name:"Amandina",price:90,img:"https://i.pinimg.com/736x/ab/85/e5/ab85e5aa4e5c4a3df58adc5ffe61a2e3.jpg"},
{name:"Ecler",price:70,img:"https://i.pinimg.com/736x/61/84/2b/61842b9b77c0b03ee364aa95482b369d.jpg"},
{name:"Tiramisu",price:110,img:"https://i.pinimg.com/webp/736x/0e/c2/89/0ec289492947872976c5c52215280faa.webp"}
];

let cart=[];

const productsDiv=document.getElementById("products");

products.forEach((p,i)=>{
const div=document.createElement("div");
div.className="card";
div.innerHTML=`
${p.badge?`<div class="badge">${p.badge}</div>`:""}
<img src="${p.img}">
<div class="card-content">
<h3>${p.name}</h3>
<p>${p.price} RON</p>
<button onclick="addToCart(${i})">Adaugă</button>
</div>`;
productsDiv.appendChild(div);
});

function addToCart(i){
let item=products[i];
let found=cart.find(x=>x.name===item.name);
if(found)found.qty++;
else cart.push({...item,qty:1});
renderCart();
}

function renderCart(){
let html="";let total=0;

cart.forEach((i,index)=>{
total+=i.price*i.qty;

html+=`
<div class="item">
<b>${i.name}</b>
<button class="remove-btn" onclick="removeItem(${index})">X</button>
<div class="qty">
<button onclick="changeQty(${index},-1)">-</button>
${i.qty}
<button onclick="changeQty(${index},1)">+</button>
</div>
<div>${i.price*i.qty} RON</div>
</div>`;
});

document.getElementById("cart").innerHTML=html;
document.getElementById("total").innerText=total;
}

function changeQty(i,val){
cart[i].qty+=val;
if(cart[i].qty<=0) cart.splice(i,1);
renderCart();
}

function removeItem(i){
cart.splice(i,1);
renderCart();
}

function clearCart(){
cart=[];
renderCart();
}

function openPopup(){
if(cart.length===0){alert("Coș gol");return;}
document.getElementById("popup").style.display="flex";
}

function confirmOrder(){
let addr=document.getElementById("address").value;
let time=document.getElementById("time").value;

let msg="Comanda:%0A";
cart.forEach(i=>{
msg+=`${i.name} x${i.qty}%0A`;
});
msg+=`Adresa:${addr}%0AOra:${time}`;

window.open("https://wa.me/40769926725?text="+msg);
document.getElementById("popup").style.display="none";
}

/* SLIDER AUTO */
let index=0;
const slides=document.getElementById("slides");

setInterval(()=>{
index++;
if(index>=slides.children.length)index=0;
slides.style.transform=`translateX(-${index*100}%)`;
},3000);
</script>

</body>
</html>
